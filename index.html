/* neutral flat polish: CSS only, no layout/function changes */
body{
  background:#FAF9F7;
}
.panel,
.card,
.empty,
.error,
.install-banner,
.history-modal,
.date-index-modal,
.taste-modal,
.taste-card{

}

button,
.back-to-main,
.top-menu-btn,
.heart-top-btn,
.blank-top-btn,
.history-btn,
.move-btn,
.load-more-wrap button{
  border-radius:4px !important;
}
.history-pill,
.history-pill.recent,
.history-rate,

function relocateViewModeForViewport(){

  const quickRow=document.querySelector('.quick-row');
  const summaryRight=document.querySelector('.summary-right');
  const favoriteListBar=document.getElementById('favoriteListBar');
  const favListMenu=document.getElementById('favListMenu');
  if(!viewRow||!quickRow||!summaryRight)return;
  if(document.body.classList.contains('favorite-mode')&&favoriteListBar){
    if(viewRow.parentElement!==favoriteListBar){
      favoriteListBar.insertBefore(viewRow, favListMenu||null);
    }
  }else if(window.matchMedia('(max-width:980px)').matches){
    if(viewRow.parentElement!==summaryRight){
      summaryRight.insertBefore(viewRow, summaryRight.firstChild);
    }
  }else{
    if(viewRow.parentElement!==quickRow){
      quickRow.appendChild(viewRow);
    }
