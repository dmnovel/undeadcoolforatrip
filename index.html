/* neutral flat polish: CSS only, no layout/function changes */
body{
  background:#FAF9F7;
}
.panel,
.card,
.empty,
.error,
.install-banner,
.history-modal,
.date-index-modal,
.taste-modal,
.taste-card{

}

button,
.back-to-main,
.top-menu-btn,
.heart-top-btn,
.blank-top-btn,
.history-btn,
.move-btn,
.load-more-wrap button{
  border-radius:4px !important;
}
.history-pill,
.history-pill.recent,
.history-rate,
